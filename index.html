<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#ffffff" />
<title>Commission</title>
<style>
  :root{
    --bg:#f4f5f7;
    --card:#ffffff;
    --line:#e7e9ee;
    --line2:#dfe2e8;
    --txt:#141821;
    --txt2:#3d4657;
    --muted:#7b8496;
    --faint:#aab1bf;
    --accent:#0f9d6f;      /* refined emerald */
    --accent-d:#0b7d58;
    --accent-soft:#e7f6ef;
    --up:#0f9d6f;
    --down:#e2504b;
    --up-soft:#e7f6ef;
    --down-soft:#fdeceb;
    --fieldbg:#f7f8fa;
    --shadow:0 1px 2px rgba(20,24,33,.04), 0 2px 8px rgba(20,24,33,.05);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--txt);
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 88px env(safe-area-inset-left);
    -webkit-font-smoothing:antialiased;
    letter-spacing:-.01em;
  }
  .wrap{max-width:560px;margin:0 auto;padding:10px 8px}

  header{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 18px}
  .brand{display:flex;align-items:center;gap:11px}
  .mark{width:36px;height:36px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px}
  .brand .t{line-height:1.1}
  .brand .t b{font-size:18px;font-weight:650;letter-spacing:-.02em}
  .brand .t span{display:block;font-size:12px;color:var(--muted);margin-top:1px}
  .icon-btn{background:var(--card);border:1px solid var(--line);color:var(--txt2);width:40px;height:40px;border-radius:11px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .icon-btn:active{transform:scale(.95)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
  .card h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 14px}

  /* Quick add */
  .amount-field{position:relative;margin-bottom:14px}
  .amount-field .cur{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:24px;color:var(--faint);font-weight:600}
  .amount-field input{
    width:100%;font-size:32px;font-weight:700;letter-spacing:-.02em;padding:16px 16px 16px 42px;border-radius:13px;
    background:var(--fieldbg);border:1px solid var(--line);color:var(--txt);outline:none;transition:border-color .15s,box-shadow .15s
  }
  .amount-field input::placeholder{color:var(--faint)}
  .amount-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .row{display:flex;gap:12px}
  .row .field{flex:1}
  label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 6px 2px;font-weight:500}
  .inp{width:100%;font-size:16px;padding:13px 14px;border-radius:11px;background:var(--fieldbg);border:1px solid var(--line);color:var(--txt);outline:none;transition:border-color .15s,box-shadow .15s}
  .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .preview{display:flex;align-items:center;justify-content:space-between;margin:16px 2px 2px;padding-top:14px;border-top:1px dashed var(--line2)}
  .preview .lbl{color:var(--muted);font-size:13.5px;font-weight:500}
  .preview .val{font-size:26px;font-weight:750;color:var(--accent);letter-spacing:-.02em}

  .btn{width:100%;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:650;cursor:pointer;color:#fff;background:var(--accent);margin-top:14px;transition:background .15s,transform .05s;box-shadow:0 1px 2px rgba(15,157,111,.25)}
  .btn:active{transform:scale(.985);background:var(--accent-d)}
  .btn.secondary{background:var(--card);color:var(--txt2);border:1px solid var(--line2);box-shadow:none}
  .btn.danger{background:var(--card);color:var(--down);border:1px solid var(--line2);box-shadow:none}

  /* Stat cards */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 12px;box-shadow:var(--shadow)}
  .stat .k{font-size:11.5px;letter-spacing:.2px;color:var(--muted);font-weight:500}
  .stat .v{font-size:19px;font-weight:750;margin-top:7px;color:var(--txt);letter-spacing:-.02em}
  .stat .s{font-size:11.5px;color:var(--faint);margin-top:3px}

  /* Comparison */
  .cmp+.cmp{margin-top:4px}
  .cmp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cmp-head .name{font-size:14.5px;font-weight:600}
  .cmp-head .name small{display:block;color:var(--muted);font-size:12px;margin-top:2px;font-weight:400}
  .bars{display:flex;flex-direction:column;gap:9px}
  .bar-line{display:flex;align-items:center;gap:10px}
  .bar-line .tag{width:42px;font-size:11.5px;color:var(--muted)}
  .bar-track{flex:1;height:12px;background:var(--fieldbg);border-radius:7px;overflow:hidden}
  .bar-fill{height:100%;border-radius:7px;background:var(--accent);width:0;transition:width .55s cubic-bezier(.4,0,.2,1)}
  .bar-fill.prev{background:#cfd4dd}
  .bar-line .amt{width:78px;text-align:right;font-size:12.5px;font-weight:600;color:var(--txt2)}
  .chg{font-size:12.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .chg.up{color:var(--up);background:var(--up-soft)}
  .chg.down{color:var(--down);background:var(--down-soft)}
  .chg.flat{color:var(--muted);background:#eef0f3}

  /* Month bars */
  .mbars{display:flex;flex-direction:column;gap:11px}
  .mrow{display:flex;align-items:center;gap:11px}
  .mrow .tag{width:38px;font-size:12.5px;color:var(--muted);font-weight:500}

  /* Records — spreadsheet style */
  #view-records .card{padding:12px 8px}
  .filters{margin-bottom:12px}
  .chips{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;margin-bottom:10px}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--fieldbg);border:1px solid var(--line2);color:var(--txt2);font-size:12.5px;font-weight:550;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.12s}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .frow{display:flex;gap:10px;align-items:center}
  .inp.sm{padding:9px 12px;font-size:14px;flex:1}
  .xls-meta{display:flex;justify-content:space-between;align-items:center;margin:2px 0 10px;gap:8px;flex-wrap:wrap}
  .xls-meta .muted{font-size:12px;color:var(--muted)}
  .xls-meta .top{font-size:11.5px;color:var(--accent-d);background:var(--accent-soft);border:1px solid #c8ecdb;padding:3px 10px;border-radius:999px;font-weight:650;white-space:nowrap}
  .xls-scroll{max-height:58vh;overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line2);border-radius:10px}
  table.xls{border-collapse:collapse;width:100%;table-layout:fixed;font-size:13px}
  col.c-date{width:52px}col.c-sale{width:86px}col.c-comm{width:82px}col.c-act{width:26px}
  table.xls th,table.xls td{border:1px solid var(--line);padding:8px 8px;text-align:left;vertical-align:top;overflow:hidden}
  table.xls thead th{position:sticky;top:0;z-index:2;background:#eef1f5;color:var(--txt2);font-weight:650;font-size:11px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
  table.xls th.sortable{cursor:pointer;user-select:none}
  table.xls th.sortable:active{background:#e4e8ee}
  table.xls th .car{color:var(--accent-d);font-size:9px;margin-left:1px;vertical-align:middle}
  table.xls td.num,table.xls th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.xls td.num{font-weight:600}
  table.xls td.num .sub{font-size:10px;color:var(--muted);font-weight:500;margin-top:1px}
  table.xls td.comm{text-align:right;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
  table.xls td.note{color:var(--txt2);font-size:12px;word-break:break-word;line-height:1.35}
  table.xls tbody tr:nth-child(even) td{background:#fafbfc}
  table.xls .act{text-align:center;padding:0}
  table.xls td.act .x{display:inline-block;color:var(--faint);cursor:pointer;font-size:13px;padding:9px 5px}
  table.xls td.act .x:active{color:var(--down)}
  table.xls tfoot td{position:sticky;bottom:0;z-index:2;background:#eef1f5;font-weight:700;color:var(--txt)}
  table.xls tfoot td.comm{color:var(--accent)}
  .xls-empty{padding:26px 12px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5}

  .empty{text-align:center;color:var(--muted);padding:34px 12px;font-size:14px;line-height:1.55}
  .empty .big{font-size:30px;margin-bottom:10px;opacity:.7}

  /* Tabs */
  .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:7px 8px calc(7px + env(safe-area-inset-bottom));z-index:20}
  .tab{flex:1;background:none;border:none;color:var(--muted);font-size:11px;padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-weight:600;border-radius:10px;transition:color .15s}
  .tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--accent)}
  .view{display:none;animation:fade .2s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(20,24,33,.32);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:40}
  .modal.open{display:flex}
  .sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:slideUp .26s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 30px rgba(20,24,33,.14)}
  @keyframes slideUp{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .sheet h3{margin:0 0 4px;font-size:18px;font-weight:650}
  .sheet .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .seg{display:flex;gap:10px;justify-content:space-between;align-items:center;margin:16px 0;padding:12px 14px;background:var(--fieldbg);border:1px solid var(--line);border-radius:11px}
  .seg .muted{color:var(--muted);font-size:12.5px}
  .link{background:none;border:none;color:var(--accent);font-weight:650;font-size:13.5px;cursor:pointer;padding:4px}
  .grip{width:38px;height:4px;background:var(--line2);border-radius:99px;margin:-6px auto 14px}

  .toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--txt);color:#fff;font-weight:600;padding:11px 20px;border-radius:999px;opacity:0;transition:.22s;z-index:50;font-size:13.5px;box-shadow:0 6px 20px rgba(20,24,33,.25);pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark">฿</div>
      <div class="t"><b>Commission</b><span>Daily tracker</span></div>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙</button>
  </header>

  <!-- RECORD VIEW -->
  <section class="view active" id="view-record">
    <div class="card">
      <h2>New sale</h2>
      <div class="amount-field">
        <span class="cur" id="curSign">฿</span>
        <input id="saleInput" type="number" inputmode="decimal" placeholder="0.00" />
      </div>
      <div class="row">
        <div class="field">
          <label>Rate %</label>
          <input id="rateInput" class="inp" type="number" inputmode="decimal" step="0.1" />
        </div>
        <div class="field">
          <label>Date</label>
          <input id="dateInput" class="inp" type="date" />
        </div>
      </div>
      <div class="field" style="margin-top:12px">
        <label>Note (optional)</label>
        <input id="noteInput" class="inp" type="text" placeholder="Client, product or reference" maxlength="60" />
      </div>
      <div class="preview">
        <span class="lbl">Your commission</span>
        <span class="val" id="commPreview">฿0.00</span>
      </div>
      <button class="btn" id="addBtn">Record sale</button>
    </div>

    <div class="stats" id="statCards"></div>
  </section>

  <!-- COMPARE VIEW -->
  <section class="view" id="view-compare">
    <div class="stats" id="statCards2"></div>
    <div class="card">
      <h2>Week vs last week</h2>
      <div class="cmp" id="weekCmp"></div>
    </div>
    <div class="card">
      <h2>Month vs last month</h2>
      <div class="cmp" id="monthCmp"></div>
    </div>
    <div class="card">
      <h2>Last 6 months</h2>
      <div class="mbars" id="monthBars"></div>
    </div>
  </section>

  <!-- RECORDS VIEW -->
  <section class="view" id="view-records">
    <div class="card">
      <h2>All records</h2>
      <div class="filters">
        <div class="chips" id="dateChips">
          <button class="chip active" data-r="all">All time</button>
          <button class="chip" data-r="today">Today</button>
          <button class="chip" data-r="7d">7 days</button>
          <button class="chip" data-r="30d">30 days</button>
          <button class="chip" data-r="month">This month</button>
        </div>
        <div class="frow">
          <input id="minAmt" class="inp sm" type="number" inputmode="decimal" placeholder="Min sale ฿ (e.g. 5000)" />
          <button class="link" id="clearFilters">Reset</button>
        </div>
      </div>
      <div id="recordList"></div>
    </div>
  </section>
</div>

<!-- Bottom Tabs -->
<nav class="tabs">
  <button class="tab active" data-view="record">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Record</button>
  <button class="tab" data-view="compare">
    <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Compare</button>
  <button class="tab" data-view="records">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Records</button>
</nav>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="sheet">
    <div class="grip"></div>
    <h3>Settings</h3>
    <p class="sub">Everything is saved privately on this device.</p>
    <div class="field" style="margin-bottom:14px">
      <label>Default commission rate %</label>
      <input id="setRate" class="inp" type="number" inputmode="decimal" step="0.1" />
    </div>
    <div class="field">
      <label>Currency symbol</label>
      <input id="setCur" class="inp" type="text" maxlength="3" />
    </div>
    <div class="seg">
      <span class="muted" id="dataInfo">—</span>
      <button class="link" id="exportBtn">Export CSV</button>
    </div>
    <button class="btn" id="saveSettings">Save changes</button>
    <button class="btn danger" id="clearAll">Clear all data</button>
    <button class="btn secondary" id="closeSettings" style="margin-top:8px">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const LS_ENTRIES="ct_entries_v1", LS_CFG="ct_config_v1";
  const $=s=>document.querySelector(s);

  let cfg={rate:3,cur:"฿"};
  let entries=[]; // {id, date:'YYYY-MM-DD', sale, rate, comm, note}
  let fRange="all", fMin=0, sortKey="date", sortDir="desc"; // records filters/sort

  /* ---------- storage ---------- */
  function load(){
    try{cfg=Object.assign(cfg,JSON.parse(localStorage.getItem(LS_CFG)||"{}"));}catch(e){}
    try{entries=JSON.parse(localStorage.getItem(LS_ENTRIES)||"[]");}catch(e){entries=[];}
  }
  function saveEntries(){localStorage.setItem(LS_ENTRIES,JSON.stringify(entries));}
  function saveCfg(){localStorage.setItem(LS_CFG,JSON.stringify(cfg));}

  /* ---------- helpers ---------- */
  const pad=n=>String(n).padStart(2,"0");
  function todayStr(d){d=d||new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
  function money(n){
    const v=(Math.round((n+Number.EPSILON)*100)/100);
    return cfg.cur+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  function moneyShort(n){
    if(Math.abs(n)>=1000) return cfg.cur+(n/1000).toFixed(n>=100000?0:1).replace(/\.0$/,"")+"k";
    return cfg.cur+(Math.round(n*100)/100).toLocaleString(undefined,{maximumFractionDigits:2});
  }
  function weekStart(d){ // Monday-based
    const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    const day=(x.getDay()+6)%7;
    x.setDate(x.getDate()-day);
    return x;
  }
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function inRange(ds,start,end){const t=parseDate(ds).getTime();return t>=start.getTime()&&t<end.getTime();}
  function sumComm(f){return entries.reduce((a,e)=>f(e)?a+e.comm:a,0);}
  function sumSale(f){return entries.reduce((a,e)=>f(e)?a+e.sale:a,0);}
  function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

  /* ---------- rendering ---------- */
  function fmtDayLabel(ds){
    const d=parseDate(ds), t=todayStr();
    if(ds===t)return "Today";
    if(ds===todayStr(addDays(new Date(),-1)))return "Yesterday";
    return d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
  }

  function renderStats(){
    const now=new Date();
    const ws=weekStart(now), we=addDays(ws,7);
    const ms=new Date(now.getFullYear(),now.getMonth(),1), me=new Date(now.getFullYear(),now.getMonth()+1,1);
    const t=todayStr();
    const html=`
      <div class="stat"><div class="k">Today</div><div class="v">${moneyShort(sumComm(e=>e.date===t))}</div><div class="s">${moneyShort(sumSale(e=>e.date===t))} sales</div></div>
      <div class="stat"><div class="k">This week</div><div class="v">${moneyShort(sumComm(e=>inRange(e.date,ws,we)))}</div><div class="s">${moneyShort(sumSale(e=>inRange(e.date,ws,we)))} sales</div></div>
      <div class="stat"><div class="k">This month</div><div class="v">${moneyShort(sumComm(e=>inRange(e.date,ms,me)))}</div><div class="s">${moneyShort(sumSale(e=>inRange(e.date,ms,me)))} sales</div></div>`;
    $("#statCards").innerHTML=html;
    $("#statCards2").innerHTML=html;
  }

  function cmpBlock(cur,prev){
    let chg,cls;
    if(prev===0&&cur===0){chg="No change";cls="flat";}
    else if(prev===0){chg="New";cls="up";}
    else{const p=((cur-prev)/prev*100);chg=(p>=0?"+":"")+p.toFixed(0)+"%";cls=p>0.5?"up":(p<-0.5?"down":"flat");}
    const max=Math.max(cur,prev,1);
    return `<div class="cmp-head">
        <div class="name">${money(cur)}<small>previous ${money(prev)}</small></div>
        <span class="chg ${cls}">${chg}</span>
      </div>
      <div class="bars">
        <div class="bar-line"><span class="tag">Now</span><div class="bar-track"><div class="bar-fill" style="width:${cur/max*100}%"></div></div></div>
        <div class="bar-line"><span class="tag">Prev</span><div class="bar-track"><div class="bar-fill prev" style="width:${prev/max*100}%"></div></div></div>
      </div>`;
  }

  function renderCompare(){
    const now=new Date();
    const ws=weekStart(now), we=addDays(ws,7), pws=addDays(ws,-7);
    $("#weekCmp").innerHTML=cmpBlock(sumComm(e=>inRange(e.date,ws,we)),sumComm(e=>inRange(e.date,pws,ws)));

    const ms=new Date(now.getFullYear(),now.getMonth(),1), me=new Date(now.getFullYear(),now.getMonth()+1,1);
    const pms=new Date(now.getFullYear(),now.getMonth()-1,1);
    $("#monthCmp").innerHTML=cmpBlock(sumComm(e=>inRange(e.date,ms,me)),sumComm(e=>inRange(e.date,pms,ms)));

    let bars="";const vals=[];
    for(let i=5;i>=0;i--){
      const s=new Date(now.getFullYear(),now.getMonth()-i,1);
      const e=new Date(now.getFullYear(),now.getMonth()-i+1,1);
      vals.push({label:s.toLocaleDateString(undefined,{month:"short"}),v:sumComm(x=>inRange(x.date,s,e))});
    }
    const mx=Math.max(...vals.map(v=>v.v),1);
    vals.forEach(v=>{
      bars+=`<div class="mrow"><span class="tag">${v.label}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${v.v/mx*100}%"></div></div>
        <span class="amt">${moneyShort(v.v)}</span></div>`;
    });
    $("#monthBars").innerHTML=bars;
  }

  function applyFilterSort(){
    const now=new Date();
    const midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    let start=null;
    if(fRange==="today")start=midnight;
    else if(fRange==="7d")start=addDays(midnight,-6);
    else if(fRange==="30d")start=addDays(midnight,-29);
    else if(fRange==="month")start=new Date(now.getFullYear(),now.getMonth(),1);
    let list=entries.filter(e=>{
      if(start&&parseDate(e.date).getTime()<start.getTime())return false;
      if(fMin&&e.sale<fMin)return false;
      return true;
    });
    const dir=sortDir==="asc"?1:-1;
    return list.map((e,i)=>({e,i})).sort((a,b)=>{
      let av,bv;
      if(sortKey==="sale"){av=a.e.sale;bv=b.e.sale;}
      else if(sortKey==="comm"){av=a.e.comm;bv=b.e.comm;}
      else{av=a.e.date;bv=b.e.date;}
      if(av<bv)return -dir; if(av>bv)return dir; return b.i-a.i;
    }).map(o=>o.e);
  }
  function topDay(list){
    if(!list.length)return null;
    const m={}; list.forEach(e=>{m[e.date]=(m[e.date]||0)+e.comm;});
    let best=null; for(const d in m){if(!best||m[d]>best.v)best={d,v:m[d]};}
    return best;
  }
  function renderRecords(){
    const list=$("#recordList");
    if(entries.length===0){
      list.innerHTML='<div class="xls-empty">No sales recorded yet.<br>Add your first sale from the Record tab.</div>';
      return;
    }
    const rowsData=applyFilterSort();
    const best=topDay(rowsData);
    const shortDate=ds=>parseDate(ds).toLocaleDateString(undefined,{day:"numeric",month:"short"});
    let totSale=0,totComm=0,rows="";
    rowsData.forEach(e=>{
      totSale+=e.sale;totComm+=e.comm;
      rows+=`<tr>
        <td>${shortDate(e.date)}</td>
        <td class="num">${money(e.sale)}<div class="sub">${e.rate}%</div></td>
        <td class="comm">${money(e.comm)}</td>
        <td class="note" title="${escapeHtml(e.note||"")}">${e.note?escapeHtml(e.note):'<span style="color:var(--faint)">—</span>'}</td>
        <td class="act"><span class="x" data-id="${e.id}" aria-label="Delete">✕</span></td>
      </tr>`;
    });
    if(rowsData.length===0)rows='<tr><td colspan="5" class="xls-empty" style="border:0">No records match these filters.</td></tr>';
    const car=k=>sortKey===k?`<span class="car">${sortDir==="asc"?"▲":"▼"}</span>`:"";
    list.innerHTML=`
      <div class="xls-meta">
        <span class="muted">${rowsData.length} row${rowsData.length===1?"":"s"} · sales ${money(totSale)}</span>
        ${best?`<span class="top">▲ Top day · ${shortDate(best.d)} · ${money(best.v)}</span>`:""}
      </div>
      <div class="xls-scroll"><table class="xls">
        <colgroup><col class="c-date"><col class="c-sale"><col class="c-comm"><col><col class="c-act"></colgroup>
        <thead><tr>
          <th class="sortable" data-k="date">Date ${car("date")}</th>
          <th class="sortable num" data-k="sale">Sale ${car("sale")}</th>
          <th class="sortable num" data-k="comm">Comm ${car("comm")}</th>
          <th>Note</th><th class="act"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td>Total</td><td class="num">${money(totSale)}</td><td class="comm">${money(totComm)}</td><td></td><td class="act"></td></tr></tfoot>
      </table></div>`;
    list.querySelectorAll(".x").forEach(b=>b.addEventListener("click",()=>del(b.dataset.id)));
    list.querySelectorAll("th.sortable").forEach(th=>th.addEventListener("click",()=>{
      const k=th.dataset.k;
      if(sortKey===k)sortDir=sortDir==="asc"?"desc":"asc";
      else{sortKey=k;sortDir="desc";}
      renderRecords();
    }));
  }

  function renderAll(){renderStats();renderCompare();renderRecords();}

  /* ---------- actions ---------- */
  function updatePreview(){
    const sale=parseFloat($("#saleInput").value)||0;
    const rate=parseFloat($("#rateInput").value)||0;
    $("#commPreview").textContent=money(sale*rate/100);
  }
  function addEntry(){
    const sale=parseFloat($("#saleInput").value);
    const rate=parseFloat($("#rateInput").value);
    const date=$("#dateInput").value||todayStr();
    if(!sale||sale<=0){toast("Enter a sale amount");$("#saleInput").focus();return;}
    if(isNaN(rate)||rate<0){toast("Enter a valid rate");return;}
    entries.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),date,sale,rate,comm:sale*rate/100,note:$("#noteInput").value.trim()});
    saveEntries();
    $("#saleInput").value="";$("#noteInput").value="";updatePreview();
    renderAll();toast("Sale recorded");
    $("#saleInput").focus();
  }
  function del(id){entries=entries.filter(e=>e.id!==id);saveEntries();renderAll();toast("Deleted");}

  function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1500);}

  /* ---------- tabs ---------- */
  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click",()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
      tab.classList.add("active");
      $("#view-"+tab.dataset.view).classList.add("active");
      window.scrollTo(0,0);
    });
  });

  /* ---------- settings ---------- */
  function openSettings(){
    $("#setRate").value=cfg.rate;$("#setCur").value=cfg.cur;
    $("#dataInfo").textContent=entries.length+" record"+(entries.length===1?"":"s")+" saved";
    $("#settingsModal").classList.add("open");
  }
  $("#settingsBtn").addEventListener("click",openSettings);
  $("#closeSettings").addEventListener("click",()=>$("#settingsModal").classList.remove("open"));
  $("#settingsModal").addEventListener("click",e=>{if(e.target===$("#settingsModal"))$("#settingsModal").classList.remove("open");});
  $("#saveSettings").addEventListener("click",()=>{
    const r=parseFloat($("#setRate").value);const c=$("#setCur").value.trim()||"฿";
    if(!isNaN(r)&&r>=0)cfg.rate=r;cfg.cur=c;saveCfg();
    $("#curSign").textContent=cfg.cur;$("#rateInput").value=cfg.rate;
    updatePreview();renderAll();$("#settingsModal").classList.remove("open");toast("Settings saved");
  });
  $("#clearAll").addEventListener("click",()=>{
    if(confirm("Delete ALL records? This cannot be undone.")){entries=[];saveEntries();renderAll();openSettings();toast("All data cleared");}
  });
  $("#exportBtn").addEventListener("click",()=>{
    if(entries.length===0){toast("Nothing to export");return;}
    const rows=[["date","sale","rate","commission","note"]].concat(entries.slice().sort((a,b)=>a.date<b.date?-1:1).map(e=>[e.date,e.sale,e.rate,e.comm,'"'+(e.note||"").replace(/"/g,'""')+'"']));
    const csv=rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="commissions.csv";a.click();URL.revokeObjectURL(url);
  });

  /* ---------- init ---------- */
  load();
  $("#curSign").textContent=cfg.cur;
  $("#rateInput").value=cfg.rate;
  $("#dateInput").value=todayStr();
  $("#saleInput").addEventListener("input",updatePreview);
  $("#rateInput").addEventListener("input",updatePreview);
  $("#addBtn").addEventListener("click",addEntry);
  $("#saleInput").addEventListener("keydown",e=>{if(e.key==="Enter")addEntry();});
  document.querySelectorAll("#dateChips .chip").forEach(c=>c.addEventListener("click",()=>{
    document.querySelectorAll("#dateChips .chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active");fRange=c.dataset.r;renderRecords();
  }));
  $("#minAmt").addEventListener("input",()=>{fMin=parseFloat($("#minAmt").value)||0;renderRecords();});
  $("#clearFilters").addEventListener("click",()=>{
    fRange="all";fMin=0;sortKey="date";sortDir="desc";$("#minAmt").value="";
    document.querySelectorAll("#dateChips .chip").forEach(x=>x.classList.toggle("active",x.dataset.r==="all"));
    renderRecords();
  });
  updatePreview();renderAll();
})();
</script>
</body>
</html>
